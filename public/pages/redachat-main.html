<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assistente IA</title>
    <link rel="stylesheet" href="../static/styles/redachat-main.css" />
    <script defer src="../static/script/redachat-main.js"></script>
  </head>
  <body>
    <button class="menu-toggle" id="menuToggle">☰</button>

    <div class="overlay" id="overlay"></div>

    <div class="container">
      <aside class="sidebar" id="sidebar">
        <button class="new-chat-btn">+ Nova Redação</button>

        <div class="history">
          <h3>Histórico</h3>

          <ul>
            <li>Redação 1</li>
          </ul>
        </div>

        <div class="user-account">
          <img src="" alt="Usuário" />
          <span>Usuario</span>
        </div>
      </aside>

      <main class="main-content">
        <div class="analysis-box">
          <h1>Redachat</h1>

          <textarea
            placeholder="Digite ou cole o a redação que deseja avaliar..."
          ></textarea>

          <button>Avaliar Redação</button>
        </div>
      </main>
    </div>
  </body>
</html>
