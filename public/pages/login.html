<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redachat - Login</title>
    <link
      rel="shortcut icon"
      href="{{ url_for('static', filename='img/own.png') }}"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="../static/styles/form.css" />
    <script defer src="../static/script/login.js"></script>
  </head>
  <body>
    <header>
      <h1>
        <a href="/">Redachat</a>
      </h1>
      <div class="button-container">
        <button onclick="window.location.href = '/login-page'" class="bt-login">
          Login
        </button>
        <button onclick="window.location.href = '/criar-conta'">
          Criar Conta
        </button>
      </div>
    </header>
    <main>
      <form id="login-form" action="">
        <div class="container">
          <h1>Bem-vindo de volta</h1>
          <p>acessar a sua conta para continuar</p>
        </div>
        <label for="email">E-mail:</label><br />
        <input type="email" id="email" name="email" required /><br /><br />

        <label for="senha">Senha:</label><br />
        <input type="password" id="senha" name="senha" required /><br /><br />

        <button class="submit-button" type="submit">Enviar</button>

        <div class="cadastrar-redirect">
          <p>Não tem uma conta?</p>
          <a href="">Cadastre-se</a>
        </div>
      </form>
    </main>
    <footer>
      <div>
        <h4>Redachat &copy; 2026</h4>
        <section>
          <a href="">Privacidade</a>
          <a href="">Termos</a>
          <a href="">Contato</a>
        </section>
      </div>
    </footer>
  </body>
</html>
