<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redachat - Criar conta</title>
    <link
      rel="shortcut icon"
      href="{{ url_for('static', filename='img/own.png') }}"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="../static/styles/form.css" />
    <script defer src="../static/script/criar-conta.js"></script>
  </head>
  <body>
    <header>
      <h1>
        <a href="/">Redachat</a>
      </h1>
      <div class="button-container">
        <button onclick="window.location.href = '/login-page'" class="bt-login">
          Login
        </button>
        <button onclick="window.location.href = '/criar-conta'">
          Criar Conta
        </button>
      </div>
    </header>
    <main>
      <form id="register-form">
        <div class="container">
          <h1>Bem-vindo ao Redachat</h1>
          <p>Crie uma conta para continuar</p>
        </div>
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required />

        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" required />
        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" required />

        <label for="confirmar-senha">Confirmar senha:</label>
        <input
          type="password"
          id="confirmar-senha"
          name="confirmar-senha"
          required
        />
        <button type="submit">Criar conta</button>
      </form>
    </main>
    <footer>
      <div>
        <h4>Redachat &copy; 2026</h4>
        <section>
          <a href="">Privacidade</a>
          <a href="">Termos</a>
          <a href="">Contato</a>
        </section>
      </div>
    </footer>
  </body>
</html>
